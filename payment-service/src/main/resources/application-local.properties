# Profil local : bypass config-server, PostgreSQL local (docker-compose)
spring.config.import=
server.port=8083

# PostgreSQL local (docker-compose up payment-db)
spring.datasource.url=jdbc:postgresql://localhost:5436/paymentsdb
spring.datasource.username=${PAYMENT_DB_USER:demo}
spring.datasource.password=${PAYMENT_DB_PASSWORD:paymentpass}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Security / Auth
security.auth.issuer=http://localhost:8080
security.auth.audience=ecommerce-api
security.permit-all=/actuator/**,/v3/api-docs/**,/swagger-ui/**,/swagger-ui.html
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/.well-known/jwks.json

# Kafka local (docker-compose up kafka)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
