spring.datasource.url=jdbc:postgresql://localhost:5436/paymentsdb
spring.datasource.username=${PAYMENT_DB_USER:demo}
spring.datasource.password=${PAYMENT_DB_PASSWORD:paymentpass}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
