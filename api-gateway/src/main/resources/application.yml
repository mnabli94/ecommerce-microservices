server:
  port: 4000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8080
          predicates:
            - Path=/api/auth/**,/api/user/**

        - id: product-service
          uri: http://product-service:8081
          predicates:
            - Path=/api/products/**,/api/categories/**

        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/api/orders/**






