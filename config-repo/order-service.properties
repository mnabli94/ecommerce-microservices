spring.application.name=order-service
server.port=8082
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:${user.dir}/local-data/orderdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.flyway.enabled=false

spring.cloud.openfeign.circuitbreaker.enabled=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

spring.jackson.time-zone=UTC
product-service.url=${PRODUCT_SERVICE_URL:http://localhost:8081}

feign.client.config.default.connectTimeout=2000
feign.client.config.default.readTimeout=2000
feign.client.config.default.loggerLevel=FULL


logging.level.org.springframework.security=INFO
logging.level.io.github.resilience4j=INFO
logging.level.com.demo.order.client=INFO

security.auth.issuer=${AUTH_ISSUER:http://auth-service:8080}
security.auth.audience=${AUTH_AUDIENCE:ecommerce-api}
security.permit-all=/actuator/health,/actuator/info,/actuator/prometheus,/v3/api-docs/**,/swagger-ui/**,/swagger-ui.html
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_SERVICE_URL:http://localhost:8080}/.well-known/jwks.json

# Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

# Logging with correlation IDs
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
springdoc.version=2.5.0
