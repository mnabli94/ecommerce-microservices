spring.application.name=product-service
server.port=8081
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:${user.dir}/local-data/productdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.flyway.enabled=false

springdoc.swagger-ui.path=/swagger-ui.html
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.jpa.open-in-view=false
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.tags.application=${spring.application.name}
security.auth.issuer=${AUTH_ISSUER:http://auth-service:8080}
security.auth.audience=${AUTH_AUDIENCE:ecommerce-api}
security.permit-all=/actuator/health,/actuator/info,/actuator/prometheus,/v3/api-docs/**,/swagger-ui/**,/swagger-ui.html
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_SERVICE_URL:http://localhost:8080}/.well-known/jwks.json

# Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

# Logging with correlation IDs
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
springdoc.version=2.5.0
