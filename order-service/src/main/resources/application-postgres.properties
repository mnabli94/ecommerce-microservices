# Postgres DB (override par env vars si présents)
spring.datasource.url=jdbc:postgresql://localhost:5434/${POSTGRES_DB:ordersdb}
spring.datasource.username=${POSTGRES_USER:demo}
spring.datasource.password=${POSTGRES_PASSWORD:demo123}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.table=flyway_schema_history

