# Postgres DB (override par env vars si prťsents)
spring.datasource.url=jdbc:postgresql://localhost:5434/${POSTGRES_DB:ordersdb}
spring.datasource.username=${POSTGRES_USER:demo}
spring.datasource.password=${POSTGRES_PASSWORD:demo123}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate


# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.table=flyway_schema_history

