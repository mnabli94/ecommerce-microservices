spring.application.name=order-service
server.port=8082
spring.profiles.active=dev


springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs


management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# JPA/Hibernate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

#spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
jwt.secret= your-256-bit-secret-key-here-please-change-this
 # URL du product-service
product-service.url=${PRODUCT_SERVICE_URL:http://localhost:8081}

# Feign
feign.client.config.default.connectTimeout=2000
feign.client.config.default.readTimeout=2000
feign.client.config.default.loggerLevel=BASIC
feign.circuitbreaker.enabled=false

# Retry : ne re-tente pas les 4xx (erreurs fonctionnelles)
resilience4j.retry.instances.productClient.maxAttempts=3
resilience4j.retry.instances.productClient.waitDuration=200ms
resilience4j.retry.instances.productClient.ignoreExceptions=feign.FeignException$BadRequest,feign.FeignException$NotFound

# Circuit breaker
resilience4j.circuitbreaker.instances.productClient.slidingWindowSize=10
resilience4j.circuitbreaker.instances.productClient.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.productClient.failureRateThreshold=50
resilience4j.circuitbreaker.instances.productClient.waitDurationInOpenState=15s
resilience4j.circuitbreaker.instances.productClient.permittedNumberOfCallsInHalfOpenState=2
resilience4j.circuitbreaker.instances.productClient.automaticTransitionFromOpenToHalfOpenEnabled=true

logging.level.org.springframework.security=INFO
logging.level.io.github.resilience4j=DEBUG
logging.level.com.demo.order.client=DEBUG
