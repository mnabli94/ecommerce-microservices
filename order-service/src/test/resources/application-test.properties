spring.application.name=order-service-test
spring.cloud.config.enabled=false

# DataSource configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=none

# Security properties
security.permit-all=/actuator/**,/v3/api-docs/**,/swagger-ui/**,/swagger-ui.html
security.auth.issuer=http://localhost:8080
security.auth.audience=ecommerce-api
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/.well-known/jwks.json

# Kafka placeholders (will be overridden by DynamicPropertySource)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Feign/Circuit Breaker (disable or point to mock servers if needed)
product-service.url=http://localhost:8081

logging.level.org.testcontainers=INFO
logging.level.com.github.dockerjava=WARN
