spring.datasource.url=jdbc:h2:file:${user.dir}/local-data/productdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.flyway.enabled=false

spring.application.name=product-service
springdoc.swagger-ui.path=/swagger-ui.html
KAFKA_BOOTSTRAP_SERVERS=localhost:9092

spring.jpa.open-in-view=false
management.endpoints.web.exposure.include=*
management.metrics.tags.application=product-service
server.port=8081
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_SERVICE_URL:http://localhost:8080}/.well-known/jwks.json
