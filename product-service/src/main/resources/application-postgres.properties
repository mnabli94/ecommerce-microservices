# Postgres DB (override par env vars si présents)
spring.datasource.url=jdbc:postgresql://localhost:5433/${POSTGRES_DB:productsdb}
spring.datasource.username=${POSTGRES_USER:demo}
spring.datasource.password=${POSTGRES_PASSWORD:demo123}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
