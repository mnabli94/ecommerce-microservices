services:
  product-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: productsdb
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo123
    ports: ["5433:5432"]
    volumes:
      - pgdata_products:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d productsdb"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  order-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ordersdb
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo123
    ports: ["5434:5432"]
    volumes:
      - pgdata_orders:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d ordersdb"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    depends_on:
      product-db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://product-db:5432/productsdb
      SPRING_DATASOURCE_USERNAME: demo
      SPRING_DATASOURCE_PASSWORD: demo123
      SERVER_PORT: 8081
    ports: ["8081:8081"]
    networks:
      - app-network

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    depends_on:
      order-db:
        condition: service_healthy
      product-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/ordersdb
      SPRING_DATASOURCE_USERNAME: demo
      SPRING_DATASOURCE_PASSWORD: demo123
      SERVER_PORT: 8082
      PRODUCT_SERVICE_URL: http://product-service:8081
    ports: ["8082:8082"]
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports: ["9090:9090"]
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata_products:
  pgdata_orders: