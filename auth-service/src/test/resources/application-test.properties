spring.application.name=auth-service-test
spring.cloud.config.enabled=false
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=none

# Auth properties
auth.issuer=http://localhost:8080
auth.access-ttl-seconds=300
auth.refresh-ttl-days=30
auth.token-type=Bearer

# Security
security.permit-all=/api/auth/**,/api/users/register,/actuator/**,/v3/api-docs/**,/swagger-ui/**,/.well-known/jwks.json

logging.level.org.testcontainers=INFO
logging.level.com.github.dockerjava=WARN
