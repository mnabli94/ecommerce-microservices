# Postgres DB (override par env vars si présents)
spring.datasource.url=jdbc:postgresql://localhost:5435/${POSTGRES_DB:usersdb}
spring.datasource.username=${POSTGRES_USER:demo}
spring.datasource.password=${POSTGRES_PASSWORD:demo123}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=1
spring.flyway.baseline-on-migrate=true
spring.flyway.table=flyway_schema_history
