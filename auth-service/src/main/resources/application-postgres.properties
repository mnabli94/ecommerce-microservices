spring.datasource.url=jdbc:postgresql://localhost:5435/usersdb
spring.datasource.username=${USER_DB_USER:auth_user}
spring.datasource.password=${USER_DB_PASSWORD:changeme}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/migration/{vendor}
spring.flyway.baseline-version=1
spring.flyway.baseline-on-migrate=true
spring.flyway.table=flyway_schema_history

# Redis Cache
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.database=0

# Cache
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.key-prefix=auth-service:
spring.cache.redis.use-key-prefix=true
spring.cache.redis.cache-null-values=false