# Profil local : bypass config-server, PostgreSQL local (docker-compose)
spring.config.import=optional:configserver:http://localhost:8888/
server.port=8080
# PostgreSQL local (docker-compose up user-db)
spring.datasource.url=jdbc:postgresql://localhost:5435/usersdb
spring.datasource.username=${USER_DB_USER:demo}
spring.datasource.password=${USER_DB_PASSWORD:userpass}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration,classpath:db/migration/
spring.flyway.baseline-on-migrate=true
spring.flyway.table=flyway_schema_history

# Auth
auth.issuer=http://localhost:8080
auth.access-ttl-seconds=300
auth.refresh-ttl-days=30

# Security
security.permit-all=/api/auth/**,/actuator/**,/v3/api-docs/**,/swagger-ui/**,/.well-known/jwks.json
security.auth-audience=ecommerce-api
# JwtDecoder : l'auth-service valide ses propres tokens (pointe sur lui-même)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/.well-known/jwks.json

# Cache : Redis local (docker-compose up redis)
spring.cache.type=redis
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:demo123}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# Tracing (Zipkin) - Forcefully disable or redirect to localhost for local development
management.tracing.enabled=false
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.sampling.probability=0.0
# Fallback for older spring cloud versions or specific exporters
spring.zipkin.enabled=false
spring.zipkin.base-url=http://localhost:9411/
